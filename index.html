<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<article data-testid="test-todo-card" role="region" aria-label="Todo item card">

  <!-- TOP ROW: checkbox + title ONLY -->
  <label>
    <input 
      type="checkbox"
      data-testid="test-todo-complete-toggle"
      aria-label="Mark task as completed"
    >

    <h2 data-testid="test-todo-title">
      Finish HNG FE Stage 0 Task
    </h2>
  </label>

  <!-- DESCRIPTION -->
  <p data-testid="test-todo-description">
    Build an accessible, testable Todo card component for HNG internship.
  </p>

  <!-- PRIORITY + STATUS -->
  <div class="meta-row">
    <span data-testid="test-todo-priority">High</span>

    <span data-testid="test-todo-status">Pending</span>
  </div>

  <!-- DUE DATE -->
  <time 
    data-testid="test-todo-due-date"
    datetime="2026-03-01T18:00:00Z"
  >
    Due March 1, 2026 - 6:00 PM UTC
  </time>

  <!-- TIME REMAINING -->
  <p data-testid="test-todo-time-remaining">
    Due in a few days
  </p>

  <!-- ACTION BUTTONS -->
  <div class="actions">
    <button data-testid="test-todo-edit-button">Edit</button>
    <button data-testid="test-todo-delete-button">Delete</button>
  </div>

</article>
  <script src="script.js"></script>
</body>
</html>
